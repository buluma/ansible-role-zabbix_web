---
- name: Prepare
  hosts: all
  become: true
  gather_facts: false

  pre_tasks:
    - name: Install sudo if missing
      ansible.builtin.raw: "{{ ansible_pkg_mgr | default('dnf') }} install -y sudo"
      become: false
      changed_when: false
      failed_when: false

    - name: Install python3 if missing
      ansible.builtin.raw: >-
        if [ -x /usr/bin/python3 ]; then exit 0; fi;
        if command -v apt-get >/dev/null 2>&1; then apt-get update && apt-get install -y python3;
        elif command -v dnf >/dev/null 2>&1; then dnf install -y python3;
        elif command -v yum >/dev/null 2>&1; then yum install -y python3;
        elif command -v zypper >/dev/null 2>&1; then zypper -n install python3;
        else exit 1; fi
      become: false
      changed_when: false
      failed_when: false

    - name: Configure passwordless sudo
      ansible.builtin.raw: >-
        if ! grep -q '^%wheel ALL=(ALL) NOPASSWD: ALL' /etc/sudoers; then
          echo '%wheel ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers;
        fi;
        visudo -cf /etc/sudoers
      become: false
      changed_when: false
      failed_when: false

  roles:
    - role: buluma.bootstrap
    - role: buluma.selinux
    - role: robertdebock.container_docs
    - role: buluma.buildtools
    - role: buluma.epel
    - role: buluma.python_pip
    - role: buluma.php
    - role: buluma.httpd
    - role: buluma.ca_certificates
    - role: buluma.zabbix_repository
    - role: buluma.core_dependencies
    - role: buluma.mysql

  tasks:
    - name: Create zabbix database
      ansible.mysql.mysql_db:
        login_user: root
        login_password: "{{ mysql_root_password }}"
        name: zabbix
        state: present

    - name: Create zabbix database user
      ansible.mysql.mysql_user:
        login_user: root
        login_password: "{{ mysql_root_password }}"
        name: zabbix
        password: zabbix
        priv: "zabbix.*:ALL"
        state: present

# buluma.zabbix_server imports the zabbix schema via a handler flushed
# during its own role execution, before this file's first play ever
# reaches its tasks: block -- so it needs its own play here, run after
# the database and user already exist above.
- name: Prepare zabbix_server
  hosts: all
  become: true
  gather_facts: false

  roles:
    - role: buluma.zabbix_server
